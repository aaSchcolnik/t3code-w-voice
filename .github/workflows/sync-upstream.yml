name: Sync upstream

on:
  schedule:
    - cron: "0 9 */5 * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    name: Sync upstream into main, open PR to voice
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/pingdotgg/t3code.git
          git fetch upstream main

      # main only carries our README + CI tweaks on top of upstream, so this
      # merge is expected to be clean. If upstream ever touches those exact
      # lines the job fails loudly here, which is the signal to resolve by hand.
      - name: Merge upstream into main
        run: git merge upstream/main --no-edit

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Check
        run: vp check

      - name: Typecheck
        run: vp run typecheck

      - name: Push main
        run: git push origin main

      # Feature work lives on `voice` and edits the same files upstream changes,
      # so a voice merge needs human conflict resolution. Instead of merging in
      # CI (which would hard-fail), open/keep a PR that brings the freshly synced
      # `main` into `voice`; conflicts are resolved in that PR, preferring the
      # voice features (voice dictation, sidebar hide, mobile new-thread button).
      - name: Open or update PR to bring main into voice
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BODY: |
            Automated upstream sync from `pingdotgg/t3code`.

            `main` has been updated from upstream and validated:
            - `vp check`
            - `vp run typecheck`

            This PR merges the updated `main` into `voice`. Resolve any conflicts
            here, preferring the voice feature changes (voice dictation, sidebar
            hide toggle, mobile new-thread button).
        run: |
          if [ -z "$(git rev-list origin/voice..main)" ]; then
            echo "voice already contains everything in main; nothing to sync."
            exit 0
          fi
          existing=$(gh pr list --repo "$GITHUB_REPOSITORY" --base voice --head main --state open --json number -q '.[0].number')
          if [ -n "$existing" ]; then
            echo "Sync PR #$existing already open; main push above updated it."
          else
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base voice \
              --head main \
              --title "chore: sync upstream into voice" \
              --body "$PR_BODY"
          fi
